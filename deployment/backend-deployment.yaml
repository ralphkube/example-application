apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flask-api
  template:
    metadata:
      labels:
        app: flask-api
    spec:
      containers:
      - name: flask-api
        image: ghcr.io/ralphkube/example-application/backend-demo:latest
        env:
          - name: REDIS_HOST
            value: redis
          - name: REDIS_PORT
            value: 6379
        imagePullPolicy: Always
        ports:
        - containerPort: 80
